<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- MApper favicon (Patch 5AH): the purple MApper bolt in a brand-teal circle
       with a soft light-green aura. Circle #14b8a6 (accent / mod-lca),
       aura #34D399 (success), bolt #863bff (the existing MApper logo).
       The original bolt-with-purple-glow asset is preserved at bolt-logo.svg. -->
  <!-- Light-green aura: concentric semi-transparent green circles (no
       gradient/filter, so it renders in every SVG engine incl. rasterizers)
       behind the solid circle, giving a soft halo that fades outward. -->
  <circle cx="32" cy="32" r="30" fill="#34D399" fill-opacity="0.10"/>
  <circle cx="32" cy="32" r="27" fill="#34D399" fill-opacity="0.18"/>
  <circle cx="32" cy="32" r="24.5" fill="#34D399" fill-opacity="0.30"/>
  <!-- Solid brand-teal circle. -->
  <circle cx="32" cy="32" r="22" fill="#14b8a6"/>
  <!-- Purple bolt (existing logo path, native viewBox 0 0 48 46), centered + scaled. -->
  <g transform="translate(17.6 18.5) scale(0.60)" fill="#863bff">
    <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>
</svg>
